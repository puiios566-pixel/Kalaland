<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>کالالند - فروشگاه قهوه</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Tahoma',sans-serif;background:#f5f5f5;color:#333;direction:rtl}
header{background:#2c3e50;color:#fff;padding:12px;text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.banner{background:#f39c12;color:#fff;padding:8px;text-align:center;font-size:12px;font-weight:bold}
.header-main{display:flex;justify-content:space-between;align-items:center;padding:8px 0}
.logo{color:#f39c12;font-size:16px;font-weight:bold;cursor:pointer}
.search-box{flex:1;margin:0 12px;display:flex;align-items:center;background:#fff;border-radius:16px;padding:0 10px}
.search-box input{border:none;outline:none;padding:6px;width:100%;font-size:12px}
.menu-btn{background:transparent;border:none;color:#fff;font-size:20px;cursor:pointer}
.sidebar{position:fixed;top:0;left:0;width:260px;height:100vh;background:#fff;overflow-y:auto;transform:translateX(-100%);transition:transform .3s;z-index:200;padding-top:80px}
.sidebar.open{transform:translateX(0)}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:199;top:80px;cursor:pointer}
.sidebar.open~.sidebar-overlay{display:block}
.menu-main{padding:12px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;background:#fff;border:none;width:100%;text-align:right;font-size:13px;font-weight:500;color:#333;border-bottom:1px solid #eee}
.menu-main:hover{background:#f8f8f8;color:#f39c12}
.content{padding:12px;margin-bottom:70px}
.page{display:none}
.page.active{display:block}
.categories{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.cat{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer}
.cat-circle{width:70px;height:70px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 2px 6px rgba(0,0,0,.1);transition:.2s}
.cat-circle:hover{transform:scale(1.05)}
.c1{background:linear-gradient(135deg,#a8d8ea,#aa96da)}
.c2{background:linear-gradient(135deg,#ffecd2,#fcb69f)}
.c3{background:linear-gradient(135deg,#ff9a56,#ff6a88)}
.c4{background:linear-gradient(135deg,#a1c4fd,#c2e59c)}
.c5{background:linear-gradient(135deg,#fa709a,#fee140)}
.cat-label{font-size:11px;font-weight:600;text-align:center;line-height:1.3}
.products-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.product-card{background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,.08);transition:.2s}
.product-img{width:100%;height:110px;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:40px}
.product-info{padding:8px}
.product-name{font-size:11px;font-weight:600;margin-bottom:3px}
.product-cat{font-size:9px;color:#999;margin-bottom:5px}
.product-price{font-size:11px;font-weight:bold;color:#f39c12;margin-bottom:6px}
.product-controls{display:flex;justify-content:space-between;align-items:center;gap:6px}
.qty-control{display:flex;align-items:center;gap:4px;background:#f0f0f0;border-radius:4px;padding:2px}
.qty-btn{background:transparent;border:none;width:20px;height:20px;cursor:pointer;font-weight:bold;color:#f39c12;font-size:12px}
.add-btn{flex:1;background:#f39c12;color:#fff;border:none;border-radius:5px;padding:6px;font-size:11px;font-weight:bold;cursor:pointer}
.add-btn:hover{background:#e67e22}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #ddd;display:grid;grid-template-columns:repeat(5,1fr);z-index:150;box-shadow:0 -2px 8px rgba(0,0,0,.08)}
.nav-item{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px;cursor:pointer;font-size:10px;color:#999;transition:.2s;position:relative}
.nav-item.active{color:#f39c12}
.nav-item.active::before{content:'';position:absolute;top:0;width:100%;height:2px;background:#f39c12}
.nav-item-icon{font-size:20px;margin-bottom:2px}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;align-items:flex-end;justify-content:center}
.modal.open{display:flex}
.modal-content{background:#fff;width:100%;max-width:500px;border-radius:12px 12px 0 0;max-height:85vh;overflow-y:auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:12px;border-bottom:1px solid #eee;position:sticky;top:0;background:#fff}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer}
.modal-body{padding:12px}
.cart-item{display:flex;gap:8px;padding:10px;border-bottom:1px solid #eee;background:#f8f8f8;border-radius:6px;margin-bottom:6px}
.cart-icon{font-size:24px;min-width:30px;text-align:center}
.cart-info{flex:1;min-width:0}
.cart-name{font-size:12px;font-weight:600;margin-bottom:2px}
.cart-price{font-size:11px;color:#f39c12;font-weight:bold}
.cart-qty-ctrl{display:flex;align-items:center;gap:6px;margin-top:6px}
.qty-btn-sm{background:#fff;border:1px solid #ddd;width:20px;height:20px;cursor:pointer;border-radius:4px;font-weight:bold;color:#f39c12;font-size:12px}
.remove-btn{background:#e74c3c;color:#fff;border:none;padding:4px 8px;border-radius:4px;cursor:pointer;font-size:10px;font-weight:bold}
.cart-empty{text-align:center;padding:30px 0;color:#999}
.cart-total{background:#fff3e0;border-radius:6px;padding:10px;margin:10px 0;text-align:center;font-weight:bold;color:#f39c12;font-size:13px}
.checkout-btn{width:100%;background:#f39c12;color:#fff;border:none;border-radius:8px;padding:10px;font-size:13px;font-weight:bold;cursor:pointer;margin-top:8px}
.form-group{margin-bottom:10px}
.form-group label{display:block;font-size:11px;font-weight:bold;margin-bottom:4px;color:#333}
.form-group input{width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;font-size:12px}
.invoice{background:#fff;padding:12px;border-radius:6px;border:1px solid #ddd;margin-bottom:10px}
.invoice-header{text-align:center;margin-bottom:10px;padding-bottom:10px;border-bottom:2px dashed #ddd}
.invoice-header h3{font-size:14px;font-weight:bold;color:#f39c12;margin-bottom:3px}
.invoice-info{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;font-size:11px}
.invoice-info div{background:#f8f8f8;padding:6px;border-radius:4px}
.invoice-table{width:100%;border-collapse:collapse;margin-bottom:10px;font-size:11px}
.invoice-table th{background:#2c3e50;color:#fff;padding:6px;text-align:right}
.invoice-table td{padding:6px;border-bottom:1px solid #eee;text-align:right}
.invoice-table tr:nth-child(even) td{background:#f8f8f8}
.invoice-total{text-align:right;font-weight:bold;color:#f39c12;font-size:12px;padding:8px;background:#fff3e0;border-radius:4px}
.invoice-actions{display:flex;gap:6px;margin-top:8px}
.invoice-actions button{flex:1;padding:8px;border:none;border-radius:4px;cursor:pointer;font-size:11px;font-weight:bold}
.save-btn{background:#27ae60;color:#fff}
.send-btn{background:#3498db;color:#fff}
.admin-wrap{max-width:1000px;margin:0 auto;padding:16px}
.admin-header{background:#2c3e50;color:#fff;padding:16px;border-radius:8px;margin-bottom:16px;display:flex;justify-content:space-between}
.admin-header button{background:#f39c12;border:none;color:#fff;padding:8px 14px;border-radius:6px;cursor:pointer}
.admin-card{background:#fff;border-radius:8px;padding:14px;box-shadow:0 2px 6px rgba(0,0,0,.08);margin-bottom:12px}
.admin-card h3{font-size:13px;font-weight:bold;color:#f39c12;margin-bottom:10px}
.admin-form input{width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;margin-bottom:8px;font-size:12px}
.admin-btn{background:#f39c12;color:#fff;border:none;padding:8px 12px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:bold}
.login-box{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:1000}
.login-box.open{display:flex}
.login-card{background:#fff;border-radius:12px;padding:24px;text-align:center;width:90%;max-width:300px}
.login-card h2{font-size:15px;font-weight:bold;margin-bottom:6px}
.login-card input{width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;margin-bottom:10px;font-size:12px;text-align:center;letter-spacing:3px}
.login-card button{width:100%;background:#f39c12;color:#fff;border:none;padding:10px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:bold}
.toast{position:fixed;bottom:80px;right:16px;background:#f39c12;color:#fff;padding:10px 16px;border-radius:20px;font-size:11px;font-weight:bold;z-index:999;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
#storePage{display:block}
#adminPage{display:none}
.back-btn{background:#f39c12;color:#fff;border:none;padding:8px 14px;border-radius:6px;cursor:pointer;margin-bottom:12px;font-size:12px;font-weight:bold}
</style>
</head>
<body>

<div id="storePage">
<header>
<div class="banner">📢 تمامی قیمت‌ها به روز شده</div>
<div class="header-main">
<div class="logo" onclick="goHome()">☕ کالالند</div>
<div class="search-box">
<input type="text" placeholder="جستجو..." oninput="search(this.value)">
<span style="color:#f39c12">🔍</span>
</div>
<button class="menu-btn" onclick="toggleMenu()">☰</button>
</div>
</header>

<div class="sidebar" id="sidebar">
<div id="menuList"></div>
<button onclick="openLoginModal()" style="width:calc(100%-28px);padding:12px;border:none;background:#f39c12;color:#fff;cursor:pointer;font-weight:bold;font-size:12px;margin:20px 14px 0;border-radius:6px">🔐 مدیر</button>
</div>
<div class="sidebar-overlay" onclick="toggleMenu()"></div>

<div class="content">
<div class="page active" id="home-page">
<div class="categories" id="categories"></div>
<div id="products"></div>
</div>

<div class="page" id="cat-page">
<button class="back-btn" onclick="goHome()">← بازگشت</button>
<div id="subCategoriesContent"></div>
</div>

<div class="page" id="service-page">
<h2 style="margin-bottom:12px;color:#f39c12">☎️ خدمات</h2>
<div style="background:#fff;padding:16px;border-radius:8px;line-height:1.8">
<p>📞 <strong>تماس:</strong> 09123456789</p>
<p>📧 <strong>ایمیل:</strong> info@kalaland.ir</p>
<p>📍 <strong>آدرس:</strong> اصفهان</p>
</div>
</div>

<div class="page" id="order-page">
<h2 style="margin-bottom:12px;color:#f39c12">📦 سفارشات</h2>
<div style="background:#fff;padding:16px;border-radius:8px;text-align:center;color:#999">
سفارشی موجود نیست
</div>
</div>

<div class="page" id="account-page">
<h2 style="margin-bottom:12px;color:#f39c12">👤 حساب</h2>
<div style="background:#fff;padding:16px;border-radius:8px;text-align:center;color:#999">
برای ورود از دکمه مدیر استفاده کنید
</div>
</div>
</div>

<div class="bottom-nav">
<div class="nav-item active" onclick="showPage('home-page',this)"><div class="nav-item-icon">🏠</div>خانه</div>
<div class="nav-item" onclick="showPage('cat-page',this)"><div class="nav-item-icon">🗂️</div>دسته</div>
<div class="nav-item" onclick="showPage('service-page',this)"><div class="nav-item-icon">☎️</div>خدمات</div>
<div class="nav-item" onclick="showPage('order-page',this)"><div class="nav-item-icon">📦</div>سفارشات</div>
<div class="nav-item" onclick="openCartModal()"><div class="nav-item-icon">🛒</div>سبد</div>
</div>

<div class="modal" id="cartModal">
<div class="modal-content">
<div class="modal-header">
<h3>🛒 سبد خرید</h3>
<button class="modal-close" onclick="closeModal('cartModal')">✕</button>
</div>
<div class="modal-body" id="cartContent"></div>
</div>
</div>

<div class="modal" id="invoiceModal">
<div class="modal-content">
<div class="modal-header">
<h3>🧾 فاکتور</h3>
<button class="modal-close" onclick="closeModal('invoiceModal')">✕</button>
</div>
<div class="modal-body" id="invoiceContent"></div>
</div>
</div>
</div>

<div id="adminPage">
<div class="admin-wrap">
<div class="admin-header">
<h1>☕ پنل مدیریت</h1>
<button onclick="logout()">خروج</button>
</div>
<div class="admin-card"><h3>افزودن محصول</h3><div class="admin-form">
<input id="pname" placeholder="نام محصول">
<input id="pprice" type="number" placeholder="قیمت">
<input id="picon" placeholder="آیکون" maxlength="2">
<select id="pcat" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;margin-bottom:8px"><option>دسته‌بندی...</option></select>
<button class="admin-btn" onclick="addProduct()">افزودن</button>
</div></div>
<div class="admin-card"><h3>محصولات</h3><div id="adminList"></div></div>
</div>
</div>

<div class="login-box" id="loginBox">
<div class="login-card">
<h2>🔐 ورود</h2>
<input type="password" id="passInput" placeholder="رمز" onkeydown="if(event.key==='Enter')login()">
<button onclick="login()">ورود</button>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
const DB={get(k,d){try{return JSON.parse(localStorage.getItem(k))||d}catch{return d}},set(k,v){localStorage.setItem(k,JSON.stringify(v))}};
let CAT=DB.get('cats',[{id:'c1',name:'اسپرسوساز',icon:'🔧',sub:[{id:'c1a',name:'خانگی'},{id:'c1b',name:'نیمه صنعتی'},{id:'c1c',name:'صنعتی'}]},{id:'c2',name:'آسیاب',icon:'⚡',sub:[{id:'c2a',name:'خانگی'},{id:'c2b',name:'نیمه صنعتی'},{id:'c2c',name:'صنعتی'}]},{id:'c3',name:'قهوه',icon:'☕',sub:[{id:'c3a',name:'تک دان'},{id:'c3b',name:'میکس'},{id:'c3c',name:'پودری'}]},{id:'c4',name:'اکسسوری',icon:'🎁',sub:[]},{id:'c5',name:'تجهیزات',icon:'🔩',sub:[{id:'c5a',name:'بلندر'},{id:'c5b',name:'یخساز'}]}]);
let PRD=DB.get('prods',[{id:1,name:'اسپرسوساز',cat:'c1a',icon:'🔧',price:4800000,desc:'حرفه‌ای'},{id:2,name:'آسیاب',cat:'c2a',icon:'⚡',price:1250000,desc:'الکتریکی'},{id:3,name:'قهوه عربیکا',cat:'c3a',icon:'☕',price:285000,desc:'تک دان'}]);
let SET=DB.get('settings',{pass:'1234'});
let cart=[],search_q='';
const fmt=n=>Number(n).toLocaleString('fa-IR')+' تومان';
const toast=m=>{const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)};
const closeModal=id=>document.getElementById(id).classList.remove('open');
const openModal=id=>document.getElementById(id).classList.add('open');

function showPage(id,btn){document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'));document.querySelectorAll('.nav-item').forEach(e=>e.classList.remove('active'));document.getElementById(id).classList.add('active');if(btn)btn.classList.add('active');document.getElementById('sidebar').classList.remove('open')}

function goHome(){showPage('home-page',document.querySelector('.nav-item:first-child'))}

function toggleMenu(){document.getElementById('sidebar').classList.toggle('open')}

function openLoginModal(){document.getElementById('loginBox').classList.add('open')}

function renderMenu(){
  let h='';
  CAT.forEach(c=>h+=`<button class="menu-main" onclick="showCategoryPage('${c.id}')">${c.icon} ${c.name}</button>`);
  document.getElementById('menuList').innerHTML=h;
}

function showCategoryPage(catId){
  const cat=CAT.find(c=>c.id===catId);
  let h=`<h2 style="margin-bottom:12px;color:#f39c12">${cat.icon} ${cat.name}</h2>`;
  cat.sub.forEach(s=>{
    const prods=PRD.filter(p=>p.cat===s.id);
    h+=`<h3 style="font-size:13px;margin:12px 0 8px;color:#333">${s.name}</h3><div class="products-grid">`;
    h+=prods.map(p=>renderProductCard(p)).join('');
    h+=`</div>`;
  });
  document.getElementById('subCategoriesContent').innerHTML=h;
  showPage('cat-page');
}

function renderCat(){
  const colors=['c1','c2','c3','c4','c5'];
  let h=CAT.map((c,i)=>`<div class="cat" onclick="showCategoryPage('${c.id}')"><div class="cat-circle ${colors[i]}">${c.icon}</div><div class="cat-label">${c.name}</div></div>`).join('');
  document.getElementById('categories').innerHTML=h;
}

function renderProductCard(p){
  const inCart=cart.find(x=>x.id===p.id);
  const qty=inCart?inCart.qty:0;
  return `<div style="background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,.08)">
    <div class="product-img">${p.icon}</div>
    <div class="product-info">
      <div class="product-name">${p.name}</div>
      <div class="product-cat">${CAT.find(c=>c.id===p.cat.substring(0,2))?.name}</div>
      <div class="product-price">${fmt(p.price)}</div>
      <div class="product-controls">
        <button class="add-btn" onclick="addCart(${p.id})">افزودن</button>
        ${qty>0?`<div class="qty-control"><button class="qty-btn" onclick="removeCart(${p.id})">−</button><span>${qty}</span><button class="qty-btn" onclick="addCart(${p.id})">+</button></div>`:''}
      </div>
    </div>
  </div>`;
}

function renderProducts(){
  let p=PRD;
  if(search_q)p=p.filter(x=>x.name.includes(search_q));
  const html=p.map(x=>renderProductCard(x)).join('');
  document.getElementById('products').innerHTML=html?`<div><h3 style="font-size:14px;margin:12px 0 8px;color:#f39c12">🔥 محصولات</h3><div class="products-grid">${html}</div></div>`:'';
}

function addCart(id){
  const p=PRD.find(x=>x.id===id);
  const ex=cart.find(x=>x.id===id);
  if(ex)ex.qty++;
  else cart.push({...p,qty:1});
  DB.set('cart',cart);
  renderProducts();
  renderMenu();
  toast('✓ اضافه شد');
}

function removeCart(id){
  const item=cart.find(x=>x.id===id);
  if(item&&item.qty>1)item.qty--;
  else cart=cart.filter(x=>x.id!==id);
  DB.set('cart',cart);
  renderProducts();
  toast('✓ حذف شد');
}

function openCartModal(){
  if(!cart.length){document.getElementById('cartContent').innerHTML='<div class="cart-empty">🛒 سبد خالی است</div>';openModal('cartModal');return}
  const tot=cart.reduce((s,x)=>s+x.price*x.qty,0);
  let h=cart.map((x,i)=>`<div class="cart-item"><div class="cart-icon">${x.icon}</div><div class="cart-info"><div class="cart-name">${x.name}</div><div class="cart-price">${fmt(x.price*x.qty)}</div><div class="cart-qty-ctrl"><button class="qty-btn-sm" onclick="removeCart(${x.id})">−</button><span>${x.qty}</span><button class="qty-btn-sm" onclick="addCart(${x.id})">+</button><button class="remove-btn" onclick="cart.splice(${i},1);DB.set('cart',cart);openCartModal()">حذف</button></div></div></div>`).join('');
  h+=`<div class="cart-total">مجموع: ${fmt(tot)}</div><button class="checkout-btn" onclick="goCheckout()">تکمیل سفارش</button>`;
  document.getElementById('cartContent').innerHTML=h;
  openModal('cartModal');
}

function goCheckout(){
  closeModal('cartModal');
  let html=`<div class="invoice"><div class="invoice-header"><h3>فاکتور سفارش</h3></div><form style="display:grid;gap:10px">
    <div class="form-group"><label>نام و نام خانوادگی *</label><input id="cname" placeholder="مثال: علی احمدی" required></div>
    <div class="form-group"><label>شهر *</label><input id="ccity" placeholder="مثال: اصفهان" required></div>
    <div class="form-group"><label>شماره تماس *</label><input id="cphone" placeholder="مثال: 09123456789" required></div>
    <button type="button" class="checkout-btn" onclick="makeInvoice()" style="margin-top:6px">صدور فاکتور</button>
  </form></div>`;
  document.getElementById('invoiceContent').innerHTML=html;
  openModal('invoiceModal');
}

function makeInvoice(){
  const name=document.getElementById('cname').value;
  const city=document.getElementById('ccity').value;
  const phone=document.getElementById('cphone').value;
  if(!name||!city||!phone){toast('⚠️ تمام فیلدها الزامی');return}
  const tot=cart.reduce((s,x)=>s+x.price*x.qty,0);
  const date=new Date().toLocaleDateString('fa-IR');
  let h=`<div class="invoice"><div class="invoice-header"><h3>☕ کالالند</h3><p style="font-size:10px">فاکتور رسمی</p></div>`;
  h+=`<div class="invoice-info"><div><strong>نام:</strong> ${name}</div><div><strong>شهر:</strong> ${city}</div><div><strong>تاریخ:</strong> ${date}</div><div><strong>تماس:</strong> ${phone}</div></div>`;
  h+=`<table class="invoice-table"><tr><th>محصول</th><th>قیمت</th><th>تعداد</th><th>جمع</th></tr>`;
  cart.forEach(x=>h+=`<tr><td>${x.name}</td><td>${fmt(x.price)}</td><td>${x.qty}</td><td>${fmt(x.price*x.qty)}</td></tr>`);
  h+=`</table><div class="invoice-total">جمع نهایی: ${fmt(tot)}</div>`;
  h+=`<div class="invoice-actions"><button class="save-btn" onclick="saveInvoice()">💾 ذخیره</button><button class="send-btn" onclick="sendInvoice('${name}','${city}','${phone}',${tot})">📤 ارسال</button></div></div>`;
  document.getElementById('invoiceContent').innerHTML=h;
}

function saveInvoice(){toast('✓ فاکتور ذخیره شد')}

function sendInvoice(n,c,p,t){const txt=`فاکتور سفارش\nنام: ${n}\nشهر: ${c}\nتماس: ${p}\nجمع: ${fmt(t)}`; window.open('https://wa.me/?text='+encodeURIComponent(txt))}

function search(q){search_q=q;renderProducts()}

function renderCatSelect(){
  let h='<option value="">انتخاب دسته‌بندی</option>';
  CAT.forEach(c=>c.sub.forEach(s=>h+=`<option value="${s.id}">${c.name} - ${s.name}</option>`));
  document.getElementById('pcat').innerHTML=h;
}

function login(){
  if(document.getElementById('passInput').value===SET.pass){
    document.getElementById('loginBox').classList.remove('open');
    document.getElementById('storePage').style.display='none';
    document.getElementById('adminPage').style.display='block';
    renderCatSelect();
    renderAdmin();
  }else toast('رمز اشتباه');
}

function logout(){
  document.getElementById('adminPage').style.display='none';
  document.getElementById('storePage').style.display='block';
  document.getElementById('passInput').value='';
}

function renderAdmin(){
  const h=PRD.map(p=>`<div style="display:flex;justify-content:space-between;padding:8px;background:#f8f8f8;margin-bottom:6px;border-radius:6px"><span>${p.icon} ${p.name} - ${fmt(p.price)}</span><button class="admin-btn" onclick="PRD.splice(PRD.indexOf(p),1);DB.set('prods',PRD);renderAdmin()">حذف</button></div>`).join('');
  document.getElementById('adminList').innerHTML=h;
}

function addProduct(){
  const name=document.getElementById('pname').value;
  const price=parseInt(document.getElementById('pprice').value);
  const icon=document.getElementById('picon').value;
  const cat=document.getElementById('pcat').value;
  if(!name||!price||!cat){toast('فیلدها را پر کن');return}
  PRD.push({id:Date.now(),name,price,icon,cat,desc:''});
  DB.set('prods',PRD);
  ['pname','pprice','picon','pcat'].forEach(id=>document.getElementById(id).value='');
  renderAdmin();
  renderProducts();
  toast('✓ افزودە شد');
}

cart=DB.get('cart',[]);
renderMenu();
renderCat();
renderProducts();
renderCatSelect();
</script>
</body>
</html>
